events {
    worker_connections 1024;
}
http {
    # Definisi grup load balancer (nama 'backend_app' harus sama dengan di compose)
    upstream my_backend {
        server backend_app:8000; # Sesuaikan port dengan aplikasi ujian nanti
    }
    
    server {
        listen 80;
        location / {
            proxy_pass http://my_backend;
        }
    }
}